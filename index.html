<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물상 테스트 - 나를 닮은 동물은?</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <meta name="google-adsense-account" content="ca-pub-2484921511255700">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2484921511255700"
     crossorigin="anonymous"></script>
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn">🌙 Dark Mode</button>
    </div>
    <div class="container">
        <header>
            <h1>동물상 테스트</h1>
            <p class="subtitle">AI가 분석하는 나의 얼굴상</p>
        </header>

        <div class="upload-section">
            <div id="image-container" class="image-frame">
                <img id="face-image" src="#" alt="your image" class="hidden" />
                <div id="placeholder" class="placeholder">얼굴 사진을 업로드하세요</div>
            </div>
            <input type="file" id="file-input" accept="image/*" class="hidden">
            <button id="upload-btn">사진 업로드하기</button>
        </div>

        <div id="result-container" class="result-section hidden">
            <!-- Results will be dynamically injected here -->
        </div>

        <hr class="divider">

        <div class="contact-section">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/xaqabzpw" method="POST" id="contact-form">
                <div class="form-group">
                    <input type="text" name="name" placeholder="성함/업체명" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="문의 내용을 입력해주세요" required></textarea>
                </div>
                <button type="submit" id="submit-btn">문의하기</button>
            </form>
        </div>
    </div>

    <div class="disqus-container">
        <div id="disqus_thread"></div>
        <script>
            var disqus_config = function () {
                this.page.url = window.location.href;  
                this.page.identifier = window.location.pathname; 
            };
            (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://kjs-123.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
    <script id="dsq-count-scr" src="//kjs-123.disqus.com/count.js" async></script>
</body>
</html>
